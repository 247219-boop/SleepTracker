<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleep Tracker</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Sleep Tracker</span>
    </div>
</nav>

<div class="container mt-4">

    <!-- INPUT FORM -->
    <div class="card p-3 shadow-sm">
        <h4 class="mb-3">Add Sleep Data</h4>

        <form id="sleepForm">
            <div class="mb-3">
                <label class="form-label">Sleep Time</label>
                <input type="time" id="sleepTime" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Wake Time</label>
                <input type="time" id="wakeTime" class="form-control">
            </div>

            <button class="btn btn-primary w-100">Save Sleep</button>
        </form>
    </div>

    <!-- RESULT -->
    <div class="card p-3 mt-3 shadow-sm">
        <h5>Sleep Summary</h5>
        <p id="resultText">No data yet</p>
    </div>

    <!-- HISTORY -->
    <div class="mt-4">
        <h5>Sleep History</h5>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Sleep</th>
                    <th>Wake</th>
                    <th>Hours</th>
                </tr>
            </thead>
            <tbody id="historyTable"></tbody>
        </table>
    </div>

</div>

<!-- SCRIPT -->
<script>
let data = JSON.parse(localStorage.getItem("sleepData")) || [];

function loadHistory() {
    let table = document.getElementById("historyTable");
    table.innerHTML = "";

    let total = 0;

    data.forEach(item => {
        total += parseFloat(item.hours);

        table.innerHTML += `
            <tr>
                <td>${item.date}</td>
                <td>${item.sleep}</td>
                <td>${item.wake}</td>
                <td>${item.hours}</td>
            </tr>
        `;
    });

    if (data.length > 0) {
        let avg = total / data.length;
        document.getElementById("resultText").innerText =
            "Weekly Average Sleep: " + avg.toFixed(1) + " hours";
    }
}

document.getElementById("sleepForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let sleep = document.getElementById("sleepTime").value;
    let wake = document.getElementById("wakeTime").value;

    if (!sleep || !wake) {
        alert("Please enter both times");
        return;
    }

    let sleepDate = new Date("2024-01-01 " + sleep);
    let wakeDate = new Date("2024-01-01 " + wake);

    if (wakeDate < sleepDate) {
        wakeDate.setDate(wakeDate.getDate() + 1);
    }

    let hours = (wakeDate - sleepDate) / (1000 * 60 * 60);

    if (hours < 6) {
        alert("⚠️ You are not getting enough sleep!");
    }

    let record = {
        date: new Date().toLocaleDateString(),
        sleep: sleep,
        wake: wake,
        hours: hours.toFixed(1)
    };

    data.push(record);
    localStorage.setItem("sleepData", JSON.stringify(data));

    loadHistory();
});

loadHistory();
</script>

</body>
</html>
