<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleep Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
font-family: Arial;
}

/* LOGIN SCREEN (NO SCROLL) */
#loginScreen {
height: 100vh;
display: flex;
align-items: center;
justify-content: center;
background: #f5f6fa;
}

/* MAIN APP (SCROLL ALLOWED) */
#app {
display: none;
}

/* DARK MODE */
.dark {
background: #121212;
color: white;
}

.dark .card {
background: #1e1e1e;
color: white;
}

.card {
border-radius: 12px;
}
</style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">

<div class="card p-4 shadow-sm text-center" style="width:320px;">
<h3>🌙 Sleep Tracker</h3>
<p class="text-muted">Enter your name</p>

<input id="nameInput" class="form-control mb-3" placeholder="Your name">

<button id="startBtn" class="btn btn-primary w-100">
Start
</button>
</div>

</div>

<!-- MAIN APP -->
<div id="app">

<!-- NAV -->
<nav class="navbar navbar-dark bg-dark px-3">
<span class="navbar-brand">🌙 Sleep Tracker</span>
<button class="btn btn-light btn-sm" onclick="toggleTheme()">🌓</button>
</nav>

<div class="container mt-3">

<!-- WELCOME -->
<div class="card p-3 mb-3">
<h4 id="welcomeText">Welcome</h4>
<p id="quote" class="text-muted mb-0"></p>
</div>

<!-- STATS -->
<div class="row text-center mb-3">

<div class="col-4">
<div class="card p-2">
😴 Avg<br>
<b id="avg">0 hrs</b>
</div>
</div>

<div class="col-4">
<div class="card p-2">
⭐ Score<br>
<b id="score">0</b>
</div>
</div>

<div class="col-4">
<div class="card p-2">
🔥 Streak<br>
<b id="streak">0</b>
</div>
</div>

</div>

<!-- INPUT -->
<div class="card p-3 mb-3">
<form id="form">
<input type="time" id="sleep" class="form-control mb-2">
<input type="time" id="wake" class="form-control mb-2">
<button class="btn btn-primary w-100">Save</button>
</form>
</div>

<!-- GRAPH -->
<div class="card p-3 mb-3">
<h5>📊 Sleep Graph</h5>
<canvas id="chart"></canvas>
</div>

<!-- HISTORY -->
<div class="card p-3 mb-3">
<h5>📅 History</h5>
<table class="table table-sm">
<tbody id="history"></tbody>
</table>
</div>

<!-- DOWNLOAD -->
<button class="btn btn-outline-primary w-100 mb-4" onclick="downloadCSV()">
⬇ Download Report
</button>

</div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("sleepData")) || [];
let chart;

const quotes = [
"Sleep is power.",
"Rest well, perform well.",
"Good sleep = better life.",
"Consistency beats everything.",
"Your body heals while you sleep."
];

/* LOGIN */
document.getElementById("startBtn").addEventListener("click", function () {

let name = document.getElementById("nameInput").value.trim();

if (!name) {
alert("Please enter your name");
return;
}

document.getElementById("loginScreen").style.display = "none";
document.getElementById("app").style.display = "block";

document.getElementById("welcomeText").innerText =
"Welcome, " + name + " 👋";

document.getElementById("quote").innerText =
quotes[Math.floor(Math.random() * quotes.length)];

});

/* UPDATE */
function update() {

let table = document.getElementById("history");
table.innerHTML = "";

let total = 0;
let labels = [];
let values = [];

data.forEach(d => {
total += +d.hours;
labels.push(d.date);
values.push(d.hours);

table.innerHTML += `
<tr>
<td>${d.date}</td>
<td>${d.hours} hrs</td>
</tr>`;
});

let avg = data.length ? total / data.length : 0;

document.getElementById("avg").innerText = avg.toFixed(1) + " hrs";
document.getElementById("score").innerText = Math.round(avg / 8 * 100);
document.getElementById("streak").innerText = data.length;

if (chart) chart.destroy();

chart = new Chart(document.getElementById("chart"), {
type: "line",
data: {
labels,
datasets: [{
label: "Sleep Hours",
data: values,
borderColor: "#0d6efd",
tension: 0.3
}]
}
});
}

/* FORM */
document.getElementById("form").addEventListener("submit", e => {
e.preventDefault();

let s = document.getElementById("sleep").value;
let w = document.getElementById("wake").value;

if (!s || !w) return;

let a = new Date("2024-01-01 " + s);
let b = new Date("2024-01-01 " + w);

if (b < a) b.setDate(b.getDate() + 1);

let hours = (b - a) / 3600000;

data.push({
date: new Date().toLocaleDateString(),
hours: hours.toFixed(1)
});

localStorage.setItem("sleepData", JSON.stringify(data));

update();
});

/* DOWNLOAD */
function downloadCSV() {

let csv = "Date,Hours\n";

data.forEach(d => {
csv += `${d.date},${d.hours}\n`;
});

let blob = new Blob([csv], { type: "text/csv" });
let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "sleep_report.csv";
a.click();
}

/* THEME */
function toggleTheme() {
document.body.classList.toggle("dark");
}

update();

</script>

</body>
</html>
