<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleep Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* FULL SCREEN APP FIX */
html, body {
height: 100%;
margin: 0;
overflow: hidden;
}

.screen {
height: 100vh;
display: flex;
align-items: center;
justify-content: center;
}

.hidden {
display: none;
}

#app {
height: 100vh;
display: flex;
flex-direction: column;
overflow: hidden;
}

/* DARK MODE */
.dark {
background: #121212;
color: #f1f1f1;
}

.dark .card {
background: #1e1e1e;
color: #f1f1f1;
}

/* UI CLEANING */
.hero {
background: white;
padding: 12px;
border-radius: 12px;
}

.card {
border-radius: 12px;
}
</style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="screen bg-light">
    <div class="card p-4 shadow-sm text-center" style="width: 320px;">
        <h3>🌙 Sleep Tracker</h3>
        <p class="text-muted">Enter your name</p>

        <input id="nameInput" class="form-control mb-3" placeholder="Your name">

        <button id="startBtn" class="btn btn-primary w-100">
            Start
        </button>
    </div>
</div>

<!-- APP SCREEN -->
<div id="app" class="hidden">

<!-- NAV -->
<nav class="navbar navbar-dark bg-dark px-3">
<span class="navbar-brand">🌙 Sleep Tracker</span>
<button class="btn btn-sm btn-light" onclick="toggleTheme()">🌓</button>
</nav>

<div class="container py-2">

<!-- HEADER -->
<div class="hero shadow-sm mb-2">
<h4 id="welcomeText">Welcome 👋</h4>
<p id="quote" class="text-muted mb-0"></p>
</div>

<!-- STATS -->
<div class="row g-2 mb-2 text-center">

<div class="col-4">
<div class="card p-2">
😴<br><b id="avg">0</b>
</div>
</div>

<div class="col-4">
<div class="card p-2">
⭐<br><b id="score">0</b>
</div>
</div>

<div class="col-4">
<div class="card p-2">
🔥<br><b id="streak">0</b>
</div>
</div>

</div>

<!-- INPUT -->
<div class="card p-2 mb-2">
<form id="form">
<input type="time" id="sleep" class="form-control mb-1">
<input type="time" id="wake" class="form-control mb-1">
<button class="btn btn-primary w-100 btn-sm">Save</button>
</form>
</div>

<!-- CHART -->
<div class="card p-2 mb-2">
<canvas id="chart"></canvas>
</div>

<!-- HISTORY -->
<div class="card p-2" style="max-height: 120px; overflow:auto;">
<table class="table table-sm mb-0">
<tbody id="history"></tbody>
</table>
</div>

</div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("sleepData")) || [];
let chart;

const quotes = [
"Sleep is power.",
"Rest = success.",
"Good sleep builds strong days.",
"Your health starts with sleep.",
"Consistency beats intensity."
];

// START BUTTON
document.getElementById("startBtn").addEventListener("click", function () {

let name = document.getElementById("nameInput").value.trim();

if (!name) {
alert("Please enter your name");
return;
}

document.getElementById("loginScreen").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");

document.getElementById("welcomeText").innerText =
"Welcome, " + name + " 👋";

document.getElementById("quote").innerText =
quotes[Math.floor(Math.random() * quotes.length)];
});

// UPDATE UI
function update() {

let table = document.getElementById("history");
table.innerHTML = "";

let total = 0;
let labels = [];
let values = [];

data.forEach(d => {
total += +d.hours;
labels.push(d.date);
values.push(d.hours);

table.innerHTML += `
<tr>
<td>${d.date}</td>
<td>${d.hours} hrs</td>
</tr>`;
});

let avg = data.length ? total / data.length : 0;

document.getElementById("avg").innerText = avg.toFixed(1);
document.getElementById("score").innerText = Math.round(avg / 8 * 100);
document.getElementById("streak").innerText = data.length;

if (chart) chart.destroy();

chart = new Chart(document.getElementById("chart"), {
type: "line",
data: {
labels,
datasets: [{
label: "Sleep",
data: values,
borderColor: "#0d6efd",
tension: 0.3
}]
}
});
}

// FORM
document.getElementById("form").addEventListener("submit", e => {
e.preventDefault();

let s = document.getElementById("sleep").value;
let w = document.getElementById("wake").value;

if (!s || !w) return;

let a = new Date("2024-01-01 " + s);
let b = new Date("2024-01-01 " + w);

if (b < a) b.setDate(b.getDate() + 1);

let hours = (b - a) / 3600000;

data.push({
date: new Date().toLocaleDateString(),
hours: hours.toFixed(1)
});

localStorage.setItem("sleepData", JSON.stringify(data));

update();
});

// THEME
function toggleTheme() {
document.body.classList.toggle("dark");
}

update();

</script>

</body>
</html>
