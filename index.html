<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleep Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
background: #f4f6f9;
transition: 0.3s;
}

.dark {
background: #121212;
color: #f1f1f1;
}

.dark .card {
background: #1e1e1e;
color: #f1f1f1;
}

.hero {
background: white;
padding: 20px;
border-radius: 15px;
}

.dark .hero {
background: #1e1e1e;
color: #f1f1f1;
}

.card {
border-radius: 14px;
}

.stat {
text-align: center;
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="navbar navbar-dark bg-dark px-3">
<span class="navbar-brand">🌙 Sleep Tracker</span>
<button class="btn btn-sm btn-light" onclick="toggleTheme()">🌓</button>
</nav>

<div class="container mt-4">

<!-- HERO -->
<div class="hero shadow-sm mb-4">
<h3 id="welcome">👋 Welcome to your Sleep Tracker</h3>
<p class="text-muted">Track your sleep and improve your health.</p>
</div>

<!-- STATS (HORIZONTAL FIXED) -->
<div class="row g-3 mb-4">

<div class="col-md-4">
<div class="card p-3 stat shadow-sm">
<div>😴 Average</div>
<h4 id="avg">0 hrs</h4>
</div>
</div>

<div class="col-md-4">
<div class="card p-3 stat shadow-sm">
<div>⭐ Score</div>
<h4 id="score">0</h4>
</div>
</div>

<div class="col-md-4">
<div class="card p-3 stat shadow-sm">
<div>🔥 Streak</div>
<h4 id="streak">0 days</h4>
</div>
</div>

</div>

<!-- FORM (IMPROVED LOOK) -->
<div class="card p-4 shadow-sm mb-4">
<h5>➕ Add Sleep Entry</h5>

<form id="form">
<div class="row g-3 mt-2">

<div class="col-md-6">
<label class="form-label">Sleep Time</label>
<input type="time" id="sleep" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label">Wake Time</label>
<input type="time" id="wake" class="form-control">
</div>

</div>

<button class="btn btn-primary w-100 mt-3">Save Entry</button>
</form>
</div>

<!-- CHART -->
<div class="card p-3 shadow-sm mb-4">
<h5>📊 Sleep Trend</h5>
<canvas id="chart"></canvas>
</div>

<!-- HISTORY -->
<div class="card p-3 shadow-sm">
<h5>📅 History</h5>

<table class="table table-striped">
<thead>
<tr>
<th>Date</th>
<th>Sleep</th>
<th>Wake</th>
<th>Hours</th>
</tr>
</thead>
<tbody id="history"></tbody>
</table>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("sleepData")) || [];
let chart;

function update() {

let table = document.getElementById("history");
table.innerHTML = "";

let total = 0;
let labels = [];
let values = [];

data.forEach(d => {
total += +d.hours;
labels.push(d.date);
values.push(d.hours);

table.innerHTML += `
<tr>
<td>${d.date}</td>
<td>${d.sleep}</td>
<td>${d.wake}</td>
<td>${d.hours}</td>
</tr>`;
});

let avg = data.length ? total / data.length : 0;

document.getElementById("avg").innerText = avg.toFixed(1) + " hrs";

document.getElementById("score").innerText =
Math.min(100, Math.round(avg / 8 * 100));

document.getElementById("streak").innerText = data.length + " days";

if (chart) chart.destroy();

chart = new Chart(document.getElementById("chart"), {
type: "line",
data: {
labels,
datasets: [{
label: "Sleep Hours",
data: values,
borderColor: "#0d6efd",
tension: 0.3
}]
}
});
}

document.getElementById("form").addEventListener("submit", e => {
e.preventDefault();

let s = document.getElementById("sleep").value;
let w = document.getElementById("wake").value;

if (!s || !w) return;

let a = new Date("2024-01-01 " + s);
let b = new Date("2024-01-01 " + w);

if (b < a) b.setDate(b.getDate() + 1);

let hours = (b - a) / 3600000;

data.push({
date: new Date().toLocaleDateString(),
sleep: s,
wake: w,
hours: hours.toFixed(1)
});

localStorage.setItem("sleepData", JSON.stringify(data));

update();
});

function toggleTheme() {
document.body.classList.toggle("dark");
}

update();
</script>

</body>
</html>
