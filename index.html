<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleep Tracker Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* GLOBAL */
* {
transition: all 0.25s ease;
}

body {
font-family: Arial;
background: #f4f6fb;
margin: 0;
}

/* LOGIN SCREEN */
#loginScreen {
height: 100vh;
display: flex;
align-items: center;
justify-content: center;
}

/* APP */
#app {
display: none;
opacity: 0;
transform: translateY(20px);
}

/* PREMIUM CARDS */
.card {
border: none;
border-radius: 14px;
box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.card:hover {
transform: translateY(-3px);
}

/* DARK MODE */
.dark {
background: #121212;
color: #fff;
}

.dark .card {
background: #1e1e1e;
color: #fff;
}

/* MOBILE */
@media (max-width: 768px) {
.row {
flex-direction: column;
}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">

<div class="card p-4 text-center" style="width:320px;">
<h3>🌙 Sleep Tracker Pro</h3>
<p class="text-muted">Enter your name</p>

<input id="nameInput" class="form-control mb-3" placeholder="Your name">

<button id="startBtn" class="btn btn-primary w-100">
Start
</button>

</div>
</div>

<!-- APP -->
<div id="app">

<!-- NAV -->
<nav class="navbar navbar-dark bg-dark px-3">
<span class="navbar-brand">🌙 Sleep Tracker Pro</span>
<button class="btn btn-light btn-sm" onclick="toggleTheme()">🌓</button>
</nav>

<div class="container mt-3">

<!-- WELCOME -->
<div class="card p-3 mb-3">
<h4 id="welcomeText">Welcome</h4>
<p class="text-muted mb-0">Track your sleep, improve your life</p>
</div>

<!-- STATS -->
<div class="row text-center mb-3">

<div class="col-4">
<div class="card p-3">
<div>😴 Average Sleep</div>
<h5 id="avg">0 hrs</h5>
</div>
</div>

<div class="col-4">
<div class="card p-3">
<div>⭐ Sleep Score</div>
<h5 id="score">0</h5>
</div>
</div>

<div class="col-4">
<div class="card p-3">
<div>🔥 Streak</div>
<h5 id="streak">0</h5>
</div>
</div>

</div>

<!-- INPUT -->
<div class="card p-3 mb-3">
<h5>➕ Add Sleep Entry</h5>

<form id="form">
<label>Sleep Time</label>
<input type="time" id="sleep" class="form-control mb-2">

<label>Wake Time</label>
<input type="time" id="wake" class="form-control mb-2">

<button class="btn btn-primary w-100">
Save Entry
</button>
</form>
</div>

<!-- GRAPH -->
<div class="card p-3 mb-3">
<h5>📊 Sleep Graph</h5>
<canvas id="chart"></canvas>
</div>

<!-- HISTORY -->
<div class="card p-3 mb-3">
<h5>📅 History</h5>

<table class="table table-sm">
<thead>
<tr>
<th>Date</th>
<th>Sleep</th>
<th>Wake</th>
<th>Hours</th>
</tr>
</thead>
<tbody id="history"></tbody>
</table>
</div>

<!-- DOWNLOAD -->
<button class="btn btn-outline-primary w-100 mb-4" onclick="downloadCSV()">
⬇ Download Report
</button>

</div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("sleepData")) || [];
let chart;

/* LOGIN ANIMATION */
document.getElementById("startBtn").addEventListener("click", function () {

let name = document.getElementById("nameInput").value.trim();

if (!name) {
alert("Enter your name");
return;
}

document.getElementById("loginScreen").style.opacity = "0";

setTimeout(() => {
document.getElementById("loginScreen").style.display = "none";

let app = document.getElementById("app");
app.style.display = "block";

setTimeout(() => {
app.style.opacity = "1";
app.style.transform = "translateY(0)";
}, 50);

}, 400);

document.getElementById("welcomeText").innerText =
"Welcome, " + name + " 👋";

});

/* UPDATE */
function update() {

let table = document.getElementById("history");
table.innerHTML = "";

let total = 0;
let labels = [];
let values = [];

data.forEach(d => {
total += +d.hours;
labels.push(d.date);
values.push(d.hours);

table.innerHTML += `
<tr>
<td>${d.date}</td>
<td>${d.sleep}</td>
<td>${d.wake}</td>
<td>${d.hours}</td>
</tr>`;
});

let avg = data.length ? total / data.length : 0;

document.getElementById("avg").innerText = avg.toFixed(1) + " hrs";
document.getElementById("score").innerText = Math.round(avg / 8 * 100);
document.getElementById("streak").innerText = data.length;

if (chart) chart.destroy();

chart = new Chart(document.getElementById("chart"), {
type: "line",
data: {
labels,
datasets: [{
label: "Sleep Hours",
data: values,
borderColor: "#0d6efd",
tension: 0.3
}]
}
});
}

/* FORM */
document.getElementById("form").addEventListener("submit", e => {
e.preventDefault();

let s = document.getElementById("sleep").value;
let w = document.getElementById("wake").value;

if (!s || !w) return;

let a = new Date("2024-01-01 " + s);
let b = new Date("2024-01-01 " + w);

if (b < a) b.setDate(b.getDate() + 1);

let hours = (b - a) / 3600000;

data.push({
date: new Date().toLocaleDateString(),
sleep: s,
wake: w,
hours: hours.toFixed(1)
});

localStorage.setItem("sleepData", JSON.stringify(data));

update();
});

/* DOWNLOAD */
function downloadCSV() {
let csv = "Date,Sleep,Wake,Hours\n";

data.forEach(d => {
csv += `${d.date},${d.sleep},${d.wake},${d.hours}\n`;
});

let blob = new Blob([csv], { type: "text/csv" });
let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "sleep_report.csv";
a.click();
}

/* THEME */
function toggleTheme() {
document.body.classList.toggle("dark");
}

update();

</script>

</body>
</html>
